name: Actualizar Guia Deportiva

on:
  schedule:
    # Se ejecuta todos los días a las 9:00 AM UTC
     - cron: '*/10 * * * *'
  workflow_dispatch: 

permissions:
  contents: write

jobs:
  crear_json:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Instalar dependencias
        run: pip install requests

      - name: Ejecutar el Robot
        run: python generar_epg.py

      - name: Guardar el nuevo JSON en el repositorio
        run: |
          git config --global user.name "Robot de AdKiller"
          git config --global user.email "robot@adkiller.com"
          git add guia_deportes.json
          # El || exit 0 evita que falle si no hubo cambios
          git commit -m "Actualizar guía de deportes" || exit 0
          git push
